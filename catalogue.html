<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REP•TARO — Catalogue</title>
  <link rel="icon" href="assets/reptaro-logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="catalogue">

  <nav class="navbar">
    <a class="nav-brand" href="index.html">
      <img src="assets/reptaro-logo.png" alt="REP•TARO" />
      REP<span class="bdot">•</span>TARO
    </a>
    <div class="nav-search">
      <input id="catalogueSearch" type="search" placeholder="Search products, sellers, categories…" autocomplete="off" />
      <button class="nav-search-btn" id="catalogueSearchBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Search
      </button>
    </div>
    <div class="nav-right">
      <button class="currency-btn" id="currencyBtn">
        <span id="currencyLabel">CNY</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <button class="profile-btn" id="profileBtn"><div class="p-avatar">👤</div><span>Profile</span></button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1>Catalogue</h1>
        <div class="sub">Browse all available products</div>
      </div>
      <span class="badge" id="badgeProducts">—</span>
    </div>

    <div class="card">
      <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between">
        <div class="cat-filters" style="margin:0">
          <button class="filter-chip active" data-cat="all">All</button>
          <button class="filter-chip" data-cat="clothes">👕 Clothes</button>
          <button class="filter-chip" data-cat="shoes">👟 Shoes</button>
          <button class="filter-chip" data-cat="accessories">⌚ Accessories</button>
          <button class="filter-chip" data-cat="electronics">🎧 Electronics</button>
          <button class="filter-chip" data-cat="hoodies">🧥 Hoodies</button>
          <button class="filter-chip" data-cat="jackets">🧥 Jackets</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          <span style="font-size:12px;color:var(--muted);font-weight:600" id="catalogueCount">—</span>
          <select class="input-field" id="sortSelect" style="height:34px;padding:0 10px;font-size:12px;width:auto">
            <option value="default">Sort: Default</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="name">Name A–Z</option>
          </select>
        </div>
      </div>
      <div style="padding:16px">
        <div class="product-grid-catalogue" id="productGrid"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="bnav-item" href="index.html"><span class="bnav-icon">🏠</span><span>Home</span></a>
    <a class="bnav-item active" href="catalogue.html"><span class="bnav-icon">📋</span><span>Catalog</span></a>
    <a class="bnav-item" href="sellers.html"><span class="bnav-icon">🏆</span><span>Sellers</span></a>
    <a class="bnav-item" href="guides.html"><span class="bnav-icon">📖</span><span>Guides</span></a>
    <a class="bnav-item" href="forums.html"><span class="bnav-icon">💬</span><span>Forums</span></a>
    <a class="bnav-item" href="alerts.html"><span class="bnav-icon">🔔</span><span>Alerts</span></a>
    <a class="bnav-item" href="announcements.html"><span class="bnav-icon">📣</span><span>News</span></a>
    <a class="bnav-item" href="tools.html"><span class="bnav-icon">🔧</span><span>Tools</span></a>
  </nav>

  <div class="modal-backdrop" id="currencyModal">
    <div class="modal-box">
      <div class="modal-head"><h3>Select Currency</h3><button class="modal-x" id="currencyClose">✕</button></div>
      <div class="modal-body">
        <div class="currency-grid">
          <div class="curr-opt" data-code="CNY"><div class="curr-code">CNY</div><div class="curr-name">Chinese Yuan ¥</div></div>
          <div class="curr-opt" data-code="USD"><div class="curr-code">USD</div><div class="curr-name">US Dollar $</div></div>
          <div class="curr-opt" data-code="GBP"><div class="curr-code">GBP</div><div class="curr-name">British Pound £</div></div>
          <div class="curr-opt" data-code="EUR"><div class="curr-code">EUR</div><div class="curr-name">Euro €</div></div>
          <div class="curr-opt" data-code="AUD"><div class="curr-code">AUD</div><div class="curr-name">Australian Dollar</div></div>
          <div class="curr-opt" data-code="CAD"><div class="curr-code">CAD</div><div class="curr-name">Canadian Dollar</div></div>
          <div class="curr-opt" data-code="JPY"><div class="curr-code">JPY</div><div class="curr-name">Japanese Yen</div></div>
          <div class="curr-opt" data-code="SGD"><div class="curr-code">SGD</div><div class="curr-name">Singapore Dollar</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
