<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TAROFINDS — Catalogue</title>
  <link rel="icon" href="assets/reptaro-logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="catalogue">

  <div class="liquid-orb liquid-orb-1"></div>
  <div class="liquid-orb liquid-orb-2"></div>
  <div class="liquid-orb liquid-orb-3"></div>
  <div class="liquid-orb liquid-orb-4"></div>

  <nav class="navbar">
    <a class="nav-brand" href="index.html">
      <img src="assets/reptaro-logo.png" alt="TAROFINDS" />
      TARO<span class="bdot">•</span>FINDS
    </a>
    <div class="nav-search">
      <input id="searchInput" type="search" placeholder="Search products, sellers…" autocomplete="off" />
      <button class="nav-search-btn" aria-label="Search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Search
      </button>
    </div>
    <div class="nav-right">
      <button class="currency-btn" id="currencyBtn">
        <span id="currencyLabel">USD</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <button class="profile-btn" id="profileBtn">
        <div class="p-avatar">👤</div>
        <span>Profile</span>
      </button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div>
        <h1 id="catalogueTitle">Catalogue</h1>
        <div class="sub">Browse all products with working category filters and search.</div>
      </div>
      <span class="badge badge-blue" id="catalogueCount">—</span>
    </div>

    <div class="catalogue-header-wrap">
      <div class="cat-search-bar">
        <input id="catalogueSearch" type="search" placeholder="Search the catalogue…" autocomplete="off" />
        <button id="catalogueSearchBtn">Search</button>
      </div>

      <div class="floating-categories-wrap catalogue-categories reveal">
        <div id="catalogueFloatingCategories" class="floating-categories">
          <div class="floating-category-skeleton"></div>
          <div class="floating-category-skeleton"></div>
          <div class="floating-category-skeleton"></div>
          <div class="floating-category-skeleton"></div>
        </div>
      </div>

      <div class="catalogue-meta">
        <div class="catalogue-count">Live product list from your catalogue data</div>
        <select id="sortSelect">
          <option value="featured">Featured first</option>
          <option value="price-asc">Price: Low to high</option>
          <option value="price-desc">Price: High to low</option>
          <option value="name">Name</option>
          <option value="seller">Seller</option>
        </select>
      </div>
    </div>

    <div id="sellerResultsSection" style="display:none;margin-bottom:18px"></div>
    <div id="productGrid"></div>
  </div>

  <nav class="bottom-nav"></nav>

  <div class="modal-backdrop" id="currencyModal">
    <div class="modal-box">
      <div class="modal-head">
        <h3>Select Currency</h3>
        <button class="modal-x" id="currencyClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="currency-grid">
          <div class="curr-opt" data-code="CNY"><div class="curr-code">CNY</div><div class="curr-name">Chinese Yuan ¥</div></div>
          <div class="curr-opt" data-code="USD"><div class="curr-code">USD</div><div class="curr-name">US Dollar $</div></div>
          <div class="curr-opt" data-code="GBP"><div class="curr-code">GBP</div><div class="curr-name">British Pound £</div></div>
          <div class="curr-opt" data-code="EUR"><div class="curr-code">EUR</div><div class="curr-name">Euro €</div></div>
          <div class="curr-opt" data-code="AUD"><div class="curr-code">AUD</div><div class="curr-name">Australian Dollar</div></div>
          <div class="curr-opt" data-code="CAD"><div class="curr-code">CAD</div><div class="curr-name">Canadian Dollar</div></div>
          <div class="curr-opt" data-code="JPY"><div class="curr-code">JPY</div><div class="curr-name">Japanese Yen</div></div>
          <div class="curr-opt" data-code="SGD"><div class="curr-code">SGD</div><div class="curr-name">Singapore Dollar</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
