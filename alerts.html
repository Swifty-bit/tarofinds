<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REP•TARO — Alerts</title>
  <link rel="icon" href="assets/reptaro-logo.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="alerts">

  <nav class="navbar">
    <a class="nav-brand" href="index.html">
      <img src="assets/reptaro-logo.png" alt="REP•TARO" />
      REP<span class="bdot">•</span>TARO
    </a>
    <div class="nav-search">
      <input type="search" placeholder="Search alerts…" autocomplete="off" />
      <button class="nav-search-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Search
      </button>
    </div>
    <div class="nav-right">
      <button class="profile-btn" id="profileBtn"><div class="p-avatar">👤</div><span>Profile</span></button>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <div><h1>🔔 Alerts</h1><div class="sub">Community warnings, scam reports, and safety notices</div></div>
    </div>
    <div id="alertsList" style="display:flex;flex-direction:column;gap:12px"></div>
  </div>

  <nav class="bottom-nav">
    <a class="bnav-item" href="index.html"><span class="bnav-icon">🏠</span><span>Home</span></a>
    <a class="bnav-item" href="catalogue.html"><span class="bnav-icon">📋</span><span>Catalog</span></a>
    <a class="bnav-item" href="sellers.html"><span class="bnav-icon">🏆</span><span>Sellers</span></a>
    <a class="bnav-item" href="guides.html"><span class="bnav-icon">📖</span><span>Guides</span></a>
    <a class="bnav-item" href="forums.html"><span class="bnav-icon">💬</span><span>Forums</span></a>
    <a class="bnav-item active" href="alerts.html"><span class="bnav-icon">🔔</span><span>Alerts</span></a>
    <a class="bnav-item" href="announcements.html"><span class="bnav-icon">📣</span><span>News</span></a>
    <a class="bnav-item" href="tools.html"><span class="bnav-icon">🔧</span><span>Tools</span></a>
  </nav>

  <div id="toast"></div>
  <script src="app.js"></script>
  <style>
    .alert-card{background:var(--surface);border-radius:var(--r2);box-shadow:var(--shadow);padding:16px 20px;display:flex;gap:14px;align-items:flex-start;border-left:4px solid transparent}
    .alert-icon{font-size:24px;flex-shrink:0}
    .alert-body{flex:1}
    .alert-title{font-size:14px;font-weight:700;margin-bottom:4px}
    .alert-text{font-size:13px;line-height:1.6;margin-bottom:6px}
    .alert-time{font-size:11px;font-weight:500;opacity:0.7}
    .alert-danger{border-left-color:var(--red);background:rgba(239,68,68,0.04)}
    .alert-danger .alert-title{color:var(--red)}
    .alert-danger .alert-text{color:#7f1d1d}
    .alert-warn{border-left-color:var(--yellow);background:rgba(245,158,11,0.05)}
    .alert-warn .alert-title{color:#92400e}
    .alert-warn .alert-text{color:#78350f}
    .alert-success{border-left-color:var(--green);background:var(--green-light)}
    .alert-success .alert-title{color:#065f46}
    .alert-success .alert-text{color:#064e3b}
    .alert-info{border-left-color:var(--blue);background:var(--blue-light)}
    .alert-info .alert-title{color:#1e40af}
    .alert-info .alert-text{color:#1e3a8a}
  </style>
</body>
</html>
